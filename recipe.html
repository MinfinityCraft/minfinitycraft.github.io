<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピッケルレシピ</title>
<meta name="description" content="Minfinity Craftのピッケルレシピページです。サーバー内で使えるピッケルの作り方を紹介しています。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- ヘッダー -->
<div id="header"></div>

<!-- スマホ用ハンバーガーボタン -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- メインコンテンツ -->
<div class="main-content">
  <div class="main-header">
    <h1>ピッケルレシピ</h1>
    <p>サーバー内で使えるピッケルの作り方を一覧で紹介します。</p>
  </div>

  <!-- 検索バー -->
  <input type="text" id="recipeSearch" placeholder="検索…">

  <!-- ピッケルリスト -->
  <section class="recipe-section">
    <div class="mine">
      <h2>採掘場A</h2>
      <div class="recipe">
        <h3>ピッケル1</h3>
        <ol>
          <li>素材1を3つ用意</li>
          <li>素材2を2つ用意</li>
          <li>クラフトして完成！</li>
        </ol>
      </div>
      <div class="recipe">
        <h3>ピッケル2</h3>
        <ol>
          <li>素材3を1つ用意</li>
          <li>素材4を4つ用意</li>
          <li>クラフトして完成！</li>
        </ol>
      </div>
    </div>
  </section>
</div>

<script>
function toggleMenu(){
  document.querySelector(".side-header").classList.toggle("active");
}

// 検索機能
document.getElementById("recipeSearch").addEventListener("input", function(){
  const filter = this.value.toLowerCase();
  const items = document.querySelectorAll(".recipe");
  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(filter) ? "" : "none";
  });
});

// header.htmlを読み込む
fetch('header.html')
  .then(res => res.text())
  .then(html => document.getElementById('header').innerHTML = html);
</script>

<script src="script.js"></script>
</body>
</html>
