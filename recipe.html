<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ピッケルレシピ</title>

<link href="style.css" rel="stylesheet">

</head>

<body>

<div id="header"></div>

<div class="main-content">

<div class="main-header">
<h1>ピッケルレシピ</h1>
<p>ピッケルの作り方一覧</p>
</div>

<input type="text" id="recipeSearch" placeholder="レシピを検索..." class="search-box">


<div class="box">
<h2>木のピッケル</h2>
<p>
木材 ×3<br>
棒 ×2
</p>
</div>


<div class="box">
<h2>石のピッケル</h2>
<p>
石 ×3<br>
棒 ×2
</p>
</div>


<div class="box">
<h2>鉄のピッケル</h2>
<p>
鉄 ×3<br>
棒 ×2
</p>
</div>


</div>


<script>

fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});

function toggleMenu(){
document.querySelector(".side-header").classList.toggle("active");
}


const search = document.getElementById("recipeSearch");

search.addEventListener("input", function(){

const keyword = search.value.toLowerCase();

const recipes = document.querySelectorAll(".box");

recipes.forEach(function(recipe){

const text = recipe.textContent.toLowerCase();

if(text.includes(keyword)){
recipe.style.display = "block";
}else{
recipe.style.display = "none";
}

});

});

</script>

</body>
</html>
