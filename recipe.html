<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ピッケルレシピ</title>
<link rel="stylesheet" href="style.css">
<style>
/* -------------------- レシピセクション -------------------- */
#recipe-section{
    margin-left:180px; /* サイドバーある場合 */
    padding:40px;
}

/* 検索バー */
#recipeSearch{
    width:300px;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:20px;
    margin-bottom:20px;
    font-size:16px;
}

/* 採掘場ボタン */
#mineFilter .mine-btn{
    background:rgba(0,0,0,0.3);
    color:white;
    border:none;
    padding:8px 12px;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
    transition: all 0.2s;
}

#mineFilter .mine-btn:hover{
    background:#00ffcc;
    color:black;
}

/* 各採掘場ブロック */
.mine{
    margin-top:40px;
    padding:25px;
    background:rgba(0,0,0,0.35);
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.mine h2{
    margin-bottom:20px;
    color:#ffe600;
    text-shadow:0 0 5px #ffe600;
}

/* 各ピッケルレシピ */
.recipe{
    background:rgba(0,0,0,0.45);
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

.recipe h3{
    color:#00ffcc;
    margin-bottom:10px;
}

.recipe ol{
    padding-left:20px;
    line-height:1.8;
}
</style>
</head>
<body>

<section id="recipe-section">

<h1>⛏ ピッケルレシピ</h1>

<!-- 検索バー -->
<input type="text" id="recipeSearch" placeholder="キーワード検索（ピッケル名・採掘場・素材）" onkeyup="searchRecipe()">

<!-- 採掘場ボタン -->
<div id="mineFilter" style="margin:20px 0;">
<button class="mine-btn" onclick="filterMine('all')">全て</button>
<button class="mine-btn" onclick="filterMine('第一')">第一採掘場</button>
<button class="mine-btn" onclick="filterMine('第二')">第二採掘場</button>
<button class="mine-btn" onclick="filterMine('第三')">第三採掘場</button>
</div>

<div class="recipe-list">

<!-- 第一採掘場 -->
<div class="mine" data-mine="第一">

<h2>第一採掘場</h2>

<div class="recipe" data-keywords="第一 石 丸石 初級">
<h3>整地ピッケルⅠ</h3>
<ol>
<li>① 丸石</li>
<li>② 丸石</li>
<li>③ 丸石</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>

<div class="recipe" data-keywords="第一 鉄 中級">
<h3>整地ピッケルⅡ</h3>
<ol>
<li>① 鉄インゴット</li>
<li>② 鉄インゴット</li>
<li>③ 鉄インゴット</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>

</div>

<!-- 第二採掘場 -->
<div class="mine" data-mine="第二">

<h2>第二採掘場</h2>

<div class="recipe" data-keywords="第二 鉄 上級">
<h3>整地ピッケルⅢ</h3>
<ol>
<li>① 鉄インゴット</li>
<li>② 鉄インゴット</li>
<li>③ 鉄インゴット</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>

</div>

</div>
</section>

<!-- JavaScript -->
<script>
function searchRecipe(){
    let input = document.getElementById("recipeSearch").value.toLowerCase();
    let recipes = document.querySelectorAll(".recipe");
    recipes.forEach(function(recipe){
        let keywords = recipe.dataset.keywords.toLowerCase();
        if(keywords.includes(input)){
            recipe.style.display = "block";
        } else {
            recipe.style.display = "none";
        }
    });
}

function filterMine(mine){
    let mines = document.querySelectorAll(".mine");
    mines.forEach(function(m){
        if(mine === 'all' || m.dataset.mine === mine){
            m.style.display = "block";
        } else {
            m.style.display = "none";
        }
    });
}
</script>

</body>
</html>
