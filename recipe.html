<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ピッケルレシピ</title>
<link rel="stylesheet" href="style.css">
<style>
/* -------------------- レシピセクション -------------------- */
#recipe-section{
    margin-left:180px; /* サイドバーがある場合 */
    padding:40px;
}

#recipeSearch{
    width:300px;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:20px;
    margin-bottom:20px;
    font-size:16px;
}

#mineFilter .mine-btn{
    background:rgba(0,0,0,0.3);
    color:white;
    border:none;
    padding:8px 12px;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
    transition: all 0.2s;
}

#mineFilter .mine-btn:hover{
    background:#00ffcc;
    color:black;
}

.mine{
    margin-top:40px;
    padding:25px;
    background:rgba(0,0,0,0.35);
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.mine h2{
    margin-bottom:20px;
    color:#ffe600;
    text-shadow:0 0 5px #ffe600;
}

.recipe{
    background:rgba(0,0,0,0.45);
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

.recipe h3{
    color:#00ffcc;
    margin-bottom:10px;
}

.recipe ol{
    padding-left:20px;
    line-height:1.8;
}
</style>
</head>
<body>

<!-- -------------------- サイドバー -------------------- -->
<div class="side-header">
  <div class="logo">
    <img src="logo.png" alt="Minfinity Craft ロゴ">
  </div>
  <div class="side-nav">
    <a href="index.html">ホーム</a>
    <a href="about.html">サーバー紹介</a>
    <a href="ranking.html">ランキング</a>
    <a href="recipe.html">ピッケルレシピ</a>
    <a href="recipe2.html">素材レシピ</a>
  </div>
</div>

<section id="recipe-section">
<h1>⛏ ピッケルレシピ</h1>

<input type="text" id="recipeSearch" placeholder="キーワード検索（ピッケル名・採掘場・素材）" onkeyup="searchRecipe()">

<div id="mineFilter" style="margin:20px 0;">
<button class="mine-btn" onclick="filterMine('all')">全て</button>
<button class="mine-btn" onclick="filterMine('第一')">第一採掘場</button>
<button class="mine-btn" onclick="filterMine('第二')">第二採掘場</button>
<button class="mine-btn" onclick="filterMine('第三')">第三採掘場</button>
</div>

<div class="recipe-list">

<div class="mine" data-mine="第一">
<h2>第一採掘場</h2>
<div class="recipe" data-keywords="第一 石 丸石 初級">
<h3>整地ピッケルⅠ</h3>
<ol>
<li>① 丸石</li>
<li>② 丸石</li>
<li>③ 丸石</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>
<div class="recipe" data-keywords="第一 鉄 中級">
<h3>整地ピッケルⅡ</h3>
<ol>
<li>① 鉄インゴット</li>
<li>② 鉄インゴット</li>
<li>③ 鉄インゴット</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>
</div>

<div class="mine" data-mine="第二">
<h2>第二採掘場</h2>
<div class="recipe" data-keywords="第二 鉄 上級">
<h3>整地ピッケルⅢ</h3>
<ol>
<li>① 鉄インゴット</li>
<li>② 鉄インゴット</li>
<li>③ 鉄インゴット</li>
<li>⑤ 棒</li>
<li>⑧ 棒</li>
</ol>
</div>
</div>

</div>
</section>

<script>
function searchRecipe(){
    let input = document.getElementById("recipeSearch").value.toLowerCase();
    let recipes = document.querySelectorAll(".recipe");
    recipes.forEach(function(recipe){
        let keywords = recipe.dataset.keywords.toLowerCase();
        recipe.style.display = keywords.includes(input) ? "block" : "none";
    });
}

function filterMine(mine){
    let mines = document.querySelectorAll(".mine");
    mines.forEach(function(m){
        m.style.display = (mine === 'all' || m.dataset.mine === mine) ? "block" : "none";
    });
}
</script>

</body>
</html>
