<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピッケルレシピ</title>
<meta name="description" content="Minfinity Craftのサーバー紹介ページです。整地特化型Minecraft統合版サーバーの特徴やルールをご紹介します。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- サイドバー -->
<div class="side-header">
  <div class="logo">
    <img src="logo.png" alt="Minfinity Craft ロゴ">
  </div>
  <div class="side-nav">
    <a href="index.html">ホーム</a>
    <a href="about.html">サーバー紹介</a>
    <a href="ranking.html">ランキング</a>
    <a href="racipe.html">ピッケルレシピ</a>
    <a heaf="recipe2.html">素材レシピ</a>
  </div>

<!-- タイトル -->
<h1 class="mc-title">⛏ ピッケルレシピ</h1>
<p class="mc-subtitle">Pickaxe Crafting Recipes</p>

<div class="recipe-search">

<input 
type="text" 
id="recipeSearch" 
placeholder="ピッケルを検索..."
onkeyup="searchRecipe()"
>

</div>
  
<!-- レシピを書く場所 -->
<div id="recipeList">

<div class="recipe-card" data-search="森林採掘場 木のピッケル">
<h3>森林採掘場</h3>
<p>使用ピッケル：木のピッケル</p>
</div>

<div class="recipe-card" data-search="岩山採掘場 石のピッケル">
<h3>岩山採掘場</h3>
<p>使用ピッケル：石のピッケル</p>
</div>

<div class="recipe-card" data-search="鉄鉱山 鉄のピッケル">
<h3>鉄鉱山</h3>
<p>使用ピッケル：鉄のピッケル</p>
</div>

<div class="recipe-card" data-search="ダイヤ鉱山 ダイヤピッケル">
<h3>ダイヤ鉱山</h3>
<p>使用ピッケル：ダイヤピッケル</p>
</div>

</div>


<script>

function searchRecipe(){

let input = document.getElementById("recipeSearch");
let filter = input.value.toLowerCase();

let cards = document.getElementsByClassName("recipe-card");

for(let i=0;i<cards.length;i++){

let keywords = cards[i].dataset.search.toLowerCase();

if(keywords.indexOf(filter) > -1){

cards[i].style.display="";

}else{

cards[i].style.display="none";

}

}

}

</script>

  
</body>
</html>
