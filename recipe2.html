<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>素材レシピ</title>

<link href="style.css" rel="stylesheet">

</head>

<body>

<div id="header"></div>

<div class="main-content">

<div class="main-header">
<h1>素材レシピ</h1>
<p>素材の作り方一覧</p>
</div>

<input type="text" id="recipeSearch" placeholder="素材を検索..." class="search-box">

<div id="recipeList"></div>

<script src="data.js"></script>

<script>

const container = document.getElementById("recipeList");

const mines = {};


/* 採掘場ごとに分類 */

materialRecipes.forEach(item => {

if(!mines[item.mine]){
mines[item.mine] = [];
}

mines[item.mine].push(item);

});


/* HTML生成 */

for(const mine in mines){

let section = "<h2>"+mine+"</h2>";

mines[mine].forEach(item=>{

section += `
<div class="recipe-item">

<div class="recipe-title" onclick="toggleRecipe(this)">
${item.name}
</div>

<div class="recipe-content">

${item.recipe.join("<br>")}

</div>

</div>
`;

});

container.innerHTML += section;

}


/* 開閉 */

function toggleRecipe(el){

const content = el.nextElementSibling;

if(content.style.display === "block"){
content.style.display = "none";
}else{
content.style.display = "block";
}

}

</script>

</body>
</html>
