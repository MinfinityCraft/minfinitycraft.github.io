<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinfinityCraft レシピ集</title>
<link rel="stylesheet" href="common.css">  
<style>
  /* レシピボックス部分だけ個別調整 */
  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 20px;
  }

  .box {
    background-color: #fff; /* ボックスだけ白で中身見やすく */
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    width: 200px;
    padding: 10px;
    text-align: center;
  }

  .box img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 10px;
  }

  .box p {
    font-size: 14px;
    line-height: 1.4;
    margin: 0;
  }

  .search-container {
    text-align: center;
    margin: 20px 0;
  }

  .search-container input {
    width: 300px;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #eee;
    font-size: 16px;
  }
</style>
</head>
<body>

<!-- 共通ヘッダー -->
<div id="headerContainer"></div>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="レシピを検索...">
</div>

<div class="container" id="recipeContainer"></div>

<!-- レシピデータ読み込み -->
<script src="date.js"></script>
<script>
  const container = document.getElementById('recipeContainer');

  function renderRecipes(list) {
    container.innerHTML = '';
    list.forEach(item => {
      const box = document.createElement('div');
      box.className = 'box';
      box.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <p>${item.name}</p>
      `;
      container.appendChild(box);
    });
  }

  renderRecipes(recipes);

  // 検索機能
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    const keyword = searchInput.value.toLowerCase();
    const filtered = recipes.filter(r => r.name.toLowerCase().includes(keyword));
    renderRecipes(filtered);
  });

  // 共通header読み込み
  fetch('header.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('headerContainer').innerHTML = html;
    });
</script>

</body>
</html>
