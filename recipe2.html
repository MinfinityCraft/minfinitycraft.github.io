<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>素材レシピ</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>

<header id="header"></header>


<main>

<h1>素材レシピ</h1>

<input type="text" id="searchBox" placeholder="素材を検索...">

<div id="recipeList"></div>

</main>


<script src="../header.js"></script>
<script src="../data.js"></script>


<script>

/* 要素取得 */

const container = document.getElementById("recipeList");
const searchBox = document.getElementById("searchBox");


/* レシピ表示関数 */

function renderRecipes(list){

container.innerHTML = "";

const mines = {};


/* 採掘場ごとに分類 */

list.forEach(item => {

if(!mines[item.mine]){

mines[item.mine] = [];

}

mines[item.mine].push(item);

});


/* HTML生成 */

for(const mine in mines){

let section = `<h2>${mine}</h2>`;

mines[mine].forEach(item=>{

section += `

<div class="recipe-item">

<div class="recipe-title" onclick="toggleRecipe(this)">
${item.name}
</div>

<div class="recipe-content">
${item.recipe.join("<br>")}
</div>

</div>

`;

});

container.innerHTML += section;

}

}


/* クリックで展開 */

function toggleRecipe(el){

const content = el.nextElementSibling;

if(content.style.display === "block"){

content.style.display = "none";

}else{

content.style.display = "block";

}

}


/* 検索機能 */

searchBox.addEventListener("input", function(){

const word = this.value.toLowerCase();

const filtered = materialRecipes.filter(item =>
item.name.toLowerCase().includes(word)
);

renderRecipes(filtered);

});


/* 初期表示 */

renderRecipes(materialRecipes);

</script>


</body>
</html>
