<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>素材レシピ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ヘッダー -->
<div id="header"></div>

<!-- ハンバーガー -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<section id="material-section">

<h1>素材レシピ</h1>

<input
type="text"
id="materialSearch"
placeholder="素材・採掘場検索"
onkeyup="searchRecipe('materialSearch','material-recipe')"
>

<div>

<button onclick="filterMine('material-recipe','all')">全て</button>
<button onclick="filterMine('material-recipe','第一')">第一採掘場</button>
<button onclick="filterMine('material-recipe','第二')">第二採掘場</button>
<button onclick="filterMine('material-recipe','第三')">第三採掘場</button>

</div>

<div id="recipeList"></div>

</section>

<script src="data.js"></script>
<script src="script.js"></script>

<script>

document
.getElementById("recipeList")
.innerHTML=
createRecipeHTML(materials,"material-recipe");

</script>

</body>
</html>
