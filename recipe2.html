<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>素材レシピ</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

<iframe src="../header.html" class="header-frame"></iframe>

</header>


<main>

<h1>素材レシピ</h1>

<input type="text" id="searchBox" placeholder="素材を検索...">

<div id="recipeList"></div>

</main>


<script src="../data.js"></script>

<script>

const container = document.getElementById("recipeList");
const searchBox = document.getElementById("searchBox");


function renderRecipes(list){

container.innerHTML = "";

const mines = {};


list.forEach(item => {

if(!mines[item.mine]){

mines[item.mine] = [];

}

mines[item.mine].push(item);

});


for(const mine in mines){

let section = `<h2>${mine}</h2>`;

mines[mine].forEach(item=>{

section += `

<div class="recipe-item">

<div class="recipe-title" onclick="toggleRecipe(this)">
${item.name}
</div>

<div class="recipe-content">
${item.recipe.join("<br>")}
</div>

</div>

`;

});

container.innerHTML += section;

}

}


function toggleRecipe(el){

const content = el.nextElementSibling;

if(content.style.display === "block"){

content.style.display = "none";

}else{

content.style.display = "block";

}

}


searchBox.addEventListener("input", function(){

const word = this.value.toLowerCase();

const filtered = materialRecipes.filter(item =>
item.name.toLowerCase().includes(word)
);

renderRecipes(filtered);

});


renderRecipes(materialRecipes);

</script>

</body>
</html>
