<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>素材レシピ</title>

<link href="style.css" rel="stylesheet">

</head>

<body>

<div id="header"></div>

<div class="main-content">

<div class="main-header">
<h1>素材レシピ</h1>
<p>素材の作り方一覧</p>
</div>

<input type="text" id="recipeSearch" placeholder="素材を検索..." class="search-box">

<div id="recipeList"></div>

</div>

<script src="data.js"></script>

<script>

fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});

function toggleMenu(){
document.querySelector(".side-header").classList.toggle("active");
}


const container = document.getElementById("recipeList");


materialRecipes.forEach(item => {

let recipeHTML = "<div class='box'>";

recipeHTML += "<h2>" + item.name + "</h2>";

recipeHTML += "<p>";

item.recipe.forEach(mat=>{
recipeHTML += mat + "<br>";
});

recipeHTML += "</p></div>";

container.innerHTML += recipeHTML;

});


const search = document.getElementById("recipeSearch");

search.addEventListener("input", function(){

const keyword = search.value.toLowerCase();

const recipes = document.querySelectorAll(".box");

recipes.forEach(function(recipe){

const text = recipe.textContent.toLowerCase();

if(text.includes(keyword)){
recipe.style.display = "block";
}else{
recipe.style.display = "none";
}

});

});

</script>

</body>
</html>
