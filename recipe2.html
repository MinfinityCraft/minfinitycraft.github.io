<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>素材レシピ</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

<nav class="navbar">

<a href="../index.html">ホーム</a>

<a href="../recipe.html">ピッケル</a>

<a href="../recipe2.html">素材</a>

</nav>

</header>


<main>

<h1>素材レシピ</h1>

<div id="recipeList"></div>

</main>


<script src="../data.js"></script>

<script>

const container = document.getElementById("recipeList");

const mines = {};


/* 採掘場ごとに分類 */

materialRecipes.forEach(item => {

if(!mines[item.mine]){

mines[item.mine] = [];

}

mines[item.mine].push(item);

});


/* HTML生成 */

for(const mine in mines){

let section = `<h2>${mine}</h2>`;

mines[mine].forEach(item=>{

section += `

<div class="recipe-item">

<div class="recipe-title" onclick="toggleRecipe(this)">

${item.name}

</div>

<div class="recipe-content">

${item.recipe.join("<br>")}

</div>

</div>

`;

});

container.innerHTML += section;

}


/* 開閉 */

function toggleRecipe(el){

const content = el.nextElementSibling;

if(content.style.display === "block"){

content.style.display = "none";

}else{

content.style.display = "block";

}

}

</script>

</body>
</html>
