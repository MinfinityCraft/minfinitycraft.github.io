<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>素材レシピ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ナビバー -->
<div id="header"></div>

<!-- ハンバーガー -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<section id="material-section">

<h1>素材レシピ</h1>

<!-- 検索 -->

<input
type="text"
id="materialSearch"
placeholder="素材・採掘場検索"
onkeyup="searchRecipe('materialSearch','material-recipe')"
>

<!-- フィルター -->

<div style="margin:20px 0;">

<button onclick="filterMine('material-recipe','all')">
全て
</button>

<button onclick="filterMine('material-recipe','第一')">
第一採掘場
</button>

<button onclick="filterMine('material-recipe','第二')">
第二採掘場
</button>

<button onclick="filterMine('material-recipe','第三')">
第三採掘場
</button>

</div>

<!-- レシピ表示エリア -->

<div id="recipeList"></div>

</section>


<!-- JS読み込み（順番大事） -->

<script src="data.js"></script>
<script src="script.js"></script>


<script>

/* ページ読み込み後に表示 */

window.onload=function(){

document
.getElementById("recipeList")
.innerHTML=
createRecipeHTML(materials,"material-recipe");

};

</script>

</body>
</html>
