<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>素材レシピ</title>
<link rel="stylesheet" href="style.css">
<style>


/* -------------------- 素材レシピセクション -------------------- */
#material-section{
    margin-left: 180px;
    padding: 40px;
}

/* 検索バー */
#materialSearch{
    width: 300px;
    max-width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 20px;
    margin-bottom: 20px;
    font-size: 16px;
    background-color: #f0f0f0; /* 薄灰色 */
    color: black;
}

/* 採掘場ボタン */
#materialFilter .mine-btn{
    background: rgba(0,0,0,0.3);
    color: white;
    border: none;
    padding: 8px 12px;
    margin-right: 5px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}

#materialFilter .mine-btn:hover{
    background: #00ffcc;
    color: black;
}

/* 採掘場ボックスを消す */
.material-mine{
    background: none;
    box-shadow: none;
    padding: 0;
    margin-top: 0;
}

.material-mine h2{
    margin-bottom: 10px;
    color: #ffe600;
    text-shadow:0 0 5px #ffe600;
}

/* 各素材レシピ */
.material-recipe{
    background: rgba(0,0,0,0.45);
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

.material-recipe h3{
    color: #00ffcc;
    margin-bottom: 10px;
}

.material-recipe ol{
    padding-left: 20px;
    line-height: 1.8;
}

/* レスポンシブ */
@media screen and (max-width: 768px){
    .side-header{
        position: relative;
        width: 100%;
        height: auto;
        flex-direction: row;
        justify-content: space-around;
        padding: 10px 0;
    }
    #material-section{
        margin-left: 0;
        padding: 20px;
    }
    #materialSearch{
        width: 90%;
    }
}
</style>
</head>
<body>

<!--  ヘッダーファイル読み込み  -->
  
<div id="header"></div>


<!-- スマホのみハンバーガーボタン -->

<button class="menu-btn" onclick="toggleMenu()">☰</button>


<section id="material-section">
<h1>Minfinity Craft サーバー</h1>

<input type="text" id="materialSearch" placeholder="キーワード検索（素材名・採掘場）" onkeyup="searchMaterial()">

<div id="materialFilter" style="margin:20px 0;">
<button class="mine-btn" onclick="filterMaterialMine('all')">全て</button>
<button class="mine-btn" onclick="filterMaterialMine('第一')">第一採掘場</button>
<button class="mine-btn" onclick="filterMaterialMine('第二')">第二採掘場</button>
<button class="mine-btn" onclick="filterMaterialMine('第三')">第三採掘場</button>
</div>

<div class="recipe-list">

<div class="material-mine" data-mine="第一">
<div class="material-recipe" data-keywords="第一 丸石 初級">
<h3>丸石素材</h3>
<ol>
<li>① 丸石</li>
<li>② 丸石</li>
<li>③ 丸石</li>
</ol>
</div>
<div class="material-recipe" data-keywords="第一 石炭 中級">
<h3>石炭素材</h3>
<ol>
<li>① 石炭</li>
<li>② 石炭</li>
<li>③ 石炭</li>
</ol>
</div>
</div>

<div class="material-mine" data-mine="第二">
<div class="material-recipe" data-keywords="第二 鉄 上級">
<h3>鉄素材</h3>
<ol>
<li>① 鉄インゴット</li>
<li>② 鉄インゴット</li>
<li>③ 鉄インゴット</li>
</ol>
</div>
</div>

</div>
</section>

<script>
function searchMaterial(){
    let input = document.getElementById("materialSearch").value.toLowerCase();
    let recipes = document.querySelectorAll(".material-recipe");
    recipes.forEach(function(recipe){
        let keywords = recipe.dataset.keywords.toLowerCase();
        recipe.style.display = keywords.includes(input) ? "block" : "none";
    });
}

function filterMaterialMine(mine){
    let mines = document.querySelectorAll(".material-mine");
    mines.forEach(function(m){
        m.style.display = (mine === 'all' || m.dataset.mine === mine) ? "block" : "none";
    });
}


function toggleMenu(){
document.querySelector(".side-header").classList.toggle("active");
}

</script>

<script src="script.js"></script>

</body>
</html>
