<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="stylesheet" href="common.css"> 
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinfinityCraft レシピ集</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #333;
    color: #fff;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }

  .search-container {
    text-align: center;
    margin: 20px 0;
  }

  .search-container input {
    width: 300px;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #eee;
    font-size: 16px;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 20px;
  }

  .box {
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    width: 200px;
    padding: 10px;
    text-align: center;
  }

  .box img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 10px;
  }

  .box p {
    font-size: 14px;
    line-height: 1.4;
    margin: 0;
  }
</style>
</head>
<body>

<header>素材レシピ</header>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="レシピを検索...">
</div>

<div class="container" id="recipeContainer"></div>

<!-- date.js からレシピデータを読み込む -->
<script src="date.js"></script>
<script>
  const container = document.getElementById('recipeContainer');

  function renderRecipes(list) {
    container.innerHTML = '';
    list.forEach(item => {
      const box = document.createElement('div');
      box.className = 'box';
      box.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <p>${item.name}</p>
      `;
      container.appendChild(box);
    });
  }

  // 最初に全レシピを表示
  renderRecipes(recipes);

  // 検索機能
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    const keyword = searchInput.value.toLowerCase();
    const filtered = recipes.filter(r => r.name.toLowerCase().includes(keyword));
    renderRecipes(filtered);
  });
</script>

</body>
</html>
