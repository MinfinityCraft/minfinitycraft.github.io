/* -------------------- 動く背景グラデーション -------------------- */
  
body {
  margin: 0;

  background: linear-gradient(-45deg, #050505, #0b1f14, #03110a, #000000);
  background-size: 400% 400%;

}

@keyframes gradientMove {
  0% {
    background-position: 0% 50%;
  }
  50% {

  }
  100% {

  }
}

/* -------------------- ナビバー -------------------- */

  padding-bottom:6px;
  transition:0.3s;
}

/* ホバーで文字変化 */
header a:hover{
  color:#ffe600;
  transform:scale(1.1);
}

/* 光るグラデーション下線 */

header a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0;
  height:3px;

  background:linear-gradient(90deg,#00ffcc,#ffe600,#ff00ff);
  box-shadow:0 0 8px #00ffcc,0 0 12px #ffe600;

  transition:0.4s;
}

header a:hover::after{

}

}

}

/* -------------------- 説明文 -------------------- */
