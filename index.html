<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO対策 -->
  <title>Minfinity Craft｜Minecraft 整地 Server</title>
  <meta name="description" content="Minfinity Craftはマイクラ整地を楽しめるMinecraft 統合版サーバーです。最新情報やランキング等、サーバーのことなら全部詰まった公式サイトです！">

  <!-- ゲーム風フォント -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    /* ---------------- ナビバー ---------------- */
    nav {
      background: #111;
      padding: 15px;
    }

    nav a {
      display: inline-block;
      color: #00ffcc;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a {
  position: relative;
  display: inline-block;
  color: #00ffcc;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
  padding-bottom: 5px;
  transition: 0.3s;
}

/* 下線用 */
nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, #00ffcc, #ffe600, #ff00ff);
  box-shadow: 0 0 8px #00ffcc, 0 0 12px #ffe600;
  transition: width 0.4s ease;
}

/* ホバー時 */
nav a:hover::after {
  width: 100%;
}

    nav a:hover {
      color: #ffe600;
      transform: scale(1.1);
    }

    /* ---------------- ヘッダー ---------------- */
    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: clamp(24px, 5vw, 48px);
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
      margin-bottom: 20px;
    }

    p {
      font-size: clamp(12px, 2.5vw, 18px);
      max-width: 800px;
      margin: 0 auto 30px;
      line-height: 1.6;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 900px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }

    /* ---------------- テーブル ---------------- */
    table {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
      border-collapse: collapse;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      white-space: nowrap;
    }

    th {
      color: #ffe600;
    }

    /* ---------------- スマホ最適化 ---------------- */
    @media (max-width: 600px) {

      h1 {
        font-size: 1.6em;
      }

      table {
        display: block;
        overflow-x: auto;
      }

      th, td {
        font-size: 0.85em;
        padding: 8px;
      }

      nav a {
        display: block;
        margin: 10px 0;
      }
    }
  </style>
</head>

<body>

  <!-- ナビバー -->
  <nav>
    <a href="index.html">ホーム</a>

  <!-- メインヘッダー -->

    <p>
      Minfinity Craftはマイクラ整地を楽しめるMinecraft 統合版サーバーです。<br>
      最新情報やランキング随時更新中
    </p>
  </header>

  <div class="box">
    <h2>サーバーについて</h2>
    <p>
      当サーバーは整地をメインにしたマイクラサーバーです。<br>
      コツコツ整地した成果がランキングに反映されます。
    </p>
  </div>

  <div class="box">
    <h2>ランキング</h2>
    <p>
      現在の整地ランキングはサーバー内で確認できます。
    </p>
  </div>

</body>
</html>
