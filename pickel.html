<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピッケルレシピ</title>
<meta name="description" content="Minfinity Craftのピッケルレシピページです。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<div id="header"></div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<main class="main-content">
  <div class="main-header">
    <h1>ピッケルレシピ</h1>
    <p>ピッケルごとのクラフト方法を確認できます</p>
    <input type="text" class="search-box" id="pickelSearch" placeholder="キーワード検索">
  </div>

  <div id="pickelList"></div>
</main>

<script>
fetch('header.html')
  .then(res => res.text())
  .then(data => document.getElementById('header').innerHTML = data);

fetch('pickel.json')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('pickelList');
    data.forEach(item => {
      const acc = document.createElement('button');
      acc.className = 'accordion';
      acc.textContent = item.name;

      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = `
        <ol>
          ${item.recipe.map(i => `<li>${i}</li>`).join('')}
        </ol>
        <p>性能：${item.performance}</p>
        <p>掘れるエリア：${item.area}</p>
        <p>説明：${item.description}</p>
      `;

      acc.addEventListener('click', () => {
        acc.classList.toggle('active');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      });

      list.appendChild(acc);
      list.appendChild(panel);
    });
  });

document.getElementById('pickelSearch').addEventListener('input', function() {
  const keyword = this.value.toLowerCase();
  document.querySelectorAll('#pickelList .accordion').forEach(acc => {
    const panel = acc.nextElementSibling;
    if(acc.textContent.toLowerCase().includes(keyword)) {
      acc.style.display = '';
      panel.style.display = acc.classList.contains('active') ? 'block' : 'none';
    } else {
      acc.style.display = 'none';
      panel.style.display = 'none';
    }
  });
});

function toggleMenu() {
  const header = document.getElementById('header');
  const main = document.querySelector('main');
  header.classList.toggle('active');
  main.style.marginLeft = header.classList.contains('active') ? '200px' : '0';
}
</script>

</body>
</html>
