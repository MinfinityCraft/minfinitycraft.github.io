<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材レシピ</title>
<meta name="description" content="Minfinity Craftの素材レシピページです。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<div id="header"></div>
<button class="menu-btn" onclick="toggleMenu()">☰</button>



<main class="main-content">
  <div class="main-header">
    <h1>素材レシピ</h1>
    <p>素材ごとのクラフト方法を確認できます</p>
    <input type="text" class="search-box" id="materialSearch" placeholder="キーワード検索">
  </div>

  <div id="materialList"></div>
</main>

<script>
// ナビバー読み込み
fetch('header.html')
  .then(res => res.text())
  .then(data => document.getElementById('header').innerHTML = data);

// JSON から素材レシピ読み込み
fetch('material.json')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('materialList');
    const categories = [...new Set(data.map(item => item.category || '未分類'))];

    categories.forEach(cat => {
      const catHeading = document.createElement('h2');
      catHeading.textContent = cat;
      list.appendChild(catHeading);

      data.filter(item => item.category === cat).forEach(item => {
        const acc = document.createElement('button');
        acc.className = 'accordion';
        acc.textContent = item.name;

        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.innerHTML = `
          <ol>
            ${Array.isArray(item.recipe) ? item.recipe.map(i => `<li>${i}</li>`).join('') : ''}
          </ol>
          <p>性能：${item.performance || ''}</p>
          <p>掘れるエリア：${item.area || ''}</p>
          <p>説明：${item.description || ''}</p>
        `;

        acc.addEventListener('click', () => {
          acc.classList.toggle('active');
          panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        list.appendChild(acc);
        list.appendChild(panel);
      });
    });
  });

// 検索機能
document.getElementById('materialSearch').addEventListener('input', function() {
  const keyword = this.value.toLowerCase();
  document.querySelectorAll('#materialList h2, #materialList .accordion').forEach(el => {
    if(el.tagName === 'H2') {
      const nextSiblings = [];
      let next = el.nextElementSibling;
      while(next && next.tagName === 'BUTTON') {
        nextSiblings.push(next);
        next = next.nextElementSibling;
      }
      const anyVisible = nextSiblings.some(btn => btn.textContent.toLowerCase().includes(keyword));
      el.style.display = anyVisible ? '' : 'none';
    } else if(el.tagName === 'BUTTON') {
      const panel = el.nextElementSibling;
      if(el.textContent.toLowerCase().includes(keyword)) {
        el.style.display = '';
        panel.style.display = el.classList.contains('active') ? 'block' : 'none';
      } else {
        el.style.display = 'none';
        panel.style.display = 'none';
      }
    }
  });
});

// ハンバーガーメニュー
function toggleMenu() {
  const header = document.getElementById('header');
  const main = document.querySelector('main');
  header.classList.toggle('active');
  main.style.marginLeft = header.classList.contains('active') ? '200px' : '0';
}
</script>

</body>
</html>
