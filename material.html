<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材レシピ</title>
<meta name="description" content="Minfinity Craftの素材レシピページです。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- ナビバー読み込み -->
<div id="header"></div>

<!-- スマホ用ハンバーガーボタン -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!--  メインコンテンツ  -->
<main>
  <h1>素材レシピ</h1>

  <!-- 検索バー -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="キーワード検索">
    <select id="categorySelect">
      <option value="all">すべての採掘場</option>
      <option value="first">第一採掘場</option>
      <option value="second">第二採掘場</option>
    </select>
  </div>

  <!-- レシピ表示エリア -->
  <div id="recipeContainer"></div>
</main>

<script src="script.js"></script>
<script>
  // header.html読み込み
  fetch('header.html')
    .then(res => res.text())
    .then(data => document.getElementById('header').innerHTML = data);

  const recipeContainer = document.getElementById('recipeContainer');
  const searchInput = document.getElementById('searchInput');
  const categorySelect = document.getElementById('categorySelect');

  let recipes = [];

  // JSON読み込み
  fetch('material.json')
    .then(res => res.json())
    .then(data => {
      recipes = data;
      renderRecipes();
    });

  function renderRecipes() {
    const keyword = searchInput.value.toLowerCase();
    const category = categorySelect.value;

    const filtered = recipes.filter(r =>
      (category === 'all' || r.category === category) &&
      r.name.toLowerCase().includes(keyword)
    );

    recipeContainer.innerHTML = '';

    const grouped = {};
    filtered.forEach(r => {
      if (!grouped[r.category]) grouped[r.category] = [];
      grouped[r.category].push(r);
    });

    for (const cat in grouped) {
      const section = document.createElement('div');
      section.className = 'recipe-section';
      const heading = document.createElement('h2');
      heading.textContent = cat === 'first' ? '第一採掘場' : '第二採掘場';
      section.appendChild(heading);

      grouped[cat].forEach(r => {
        const accordion = document.createElement('button');
        accordion.className = 'accordion';
        accordion.textContent = r.name;

        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.innerHTML = `<p>${r.details}</p>`;

        accordion.addEventListener('click', () => {
          accordion.classList.toggle('active');
          panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        });

        section.appendChild(accordion);
        section.appendChild(panel);
      });

      recipeContainer.appendChild(section);
    }
  }

  searchInput.addEventListener('input', renderRecipes);
  categorySelect.addEventListener('change', renderRecipes);
</script>
</body>
</html>
