<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参加方法</title>
<meta name="description" content="Minfinity Craftのサーバー参加方法ページです。統合版（Bedrock Edition）での参加手順をご紹介します。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- ナビバー読み込み -->
<div id="header"></div>

<!-- スマホ用ハンバーガーボタン -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- メインコンテンツ -->
<div class="main-content">
  <div class="main-header">
    <h1 class="site-title">
      <span class="mc-text">参加方法</span>
    </h1>
    <p>このページではサーバーへの参加方法を詳しくご紹介します。統合版（Bedrock Edition）で参加可能です。</p>
  </div>

  <section class="section-box">
    <h2>🎮 参加手順</h2>
    <p>サーバーに参加するには、以下の手順を確認してください。</p><br>
    <ul>
      <li>公式案内からサーバーアドレスを取得</li>
      <li>Minecraft統合版を起動</li>
      <li>「サーバーに接続」を選択</li>
      <li>アドレスを入力して接続</li>
      <li>遊び方やルールを守ってプレイ</li>
    </ul><br>
    <p>問題があった場合は公式Discordや問い合わせからサポートを受けてください。</p>
  </section>
</div>

<script>
fetch("header.html")
.then(response => response.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
});
</script>

<script src="script.js"></script>

</body>
</html>
