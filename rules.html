<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルール一覧</title>
<meta name="description" content="Minfinity Craftのサーバー参加方法ページです。統合版（Bedrock Edition）での参加手順をご紹介します。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- ナビバー読み込み -->
<div id="header"></div>

<!-- スマホ用ハンバーガーボタン -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- メインコンテンツ -->
<div class="main-content">
  <div class="main-header">
    <h1 class="site-title">
      <span class="mc-text">ルール一覧</span>
    </h1>
    <p>このページでは「サーバー内ルール」「Discordルール」「権限者規約」を掲載しています</p>
  </div>

  <!-- サーバー内ルール -->
  <button class="accordion">サーバー内ルール</button>
  <div class="panel">
    <ul>
      <li>他プレイヤーへの迷惑行為は禁止</li>
      <li>不正ツールの使用は禁止</li>
      <li>運営の指示には従ってください</li>
    </ul>
  </div>

  <!-- Discordルール -->
  <button class="accordion">Discordルール</button>
  <div class="panel">
    <ul>
      <li>誹謗中傷禁止</li>
      <li>個人情報の公開禁止</li>
      <li>管理者の指示に従うこと</li>
    </ul>
  </div>

  <!-- 権限者規約 -->
  <button class="accordion">権限者規約</button>
  <div class="panel">
    <ul>
      <li>権限を乱用しないこと</li>
      <li>ルール違反者への対応を適切に行う</li>
      <li>権限の変更や削除は必ず記録する</li>
    </ul>
  </div>
</div>

<script>
fetch("header.html")
.then(response => response.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
});
</script>

<script src="script.js"></script>

<!-- 折りたたみ用スクリプト -->
<script>
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    this.classList.toggle("active");
    var panel = this.nextElementSibling;
    if (panel.style.display === "block") {
      panel.style.display = "none";
    } else {
      panel.style.display = "block";
    }
  });
}
</script>

</body>
</html>
