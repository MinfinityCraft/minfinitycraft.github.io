<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルール一覧</title>
<meta name="description" content="Minfinity Craftのサーバー参加方法ページです。統合版（Bedrock Edition）での参加手順をご紹介します。">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="style.css" rel="stylesheet">
</head>
<body>

<!-- ナビバー読み込み -->
<div id="header"></div>

<!-- スマホ用ハンバーガーボタン -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- メインコンテンツ -->
<div class="main-content">
  <div class="main-header">
    <h1 class="site-title">
      <span class="mc-text">ルール一覧</span>
    </h1>
    <p>このページでは「サーバー内ルール」「Discordルール」「権限者規約」を掲載しています</p>
  </div>

 <!-- サーバー内ルール -->
<button class="accordion">サーバー内ルール</button>
<div class="panel">
  <p>他プレイヤーへの迷惑行為は禁止です。マナーを守ってプレイしてください。</p>
  <p>不正ツールの使用は禁止です。発覚した場合は処罰対象となります。</p>
  <p>運営の指示には必ず従ってください。</p>
</div>

<!-- Discordルール -->
<button class="accordion">Discordルール</button>
<div class="panel">
  <p>誹謗中傷は禁止です。相手を尊重した発言を心がけてください。</p>
  <p>個人情報の公開は禁止です。安全に利用してください。</p>
  <p>管理者の指示には従ってください。</p>
</div>

<!-- 権限者規約 -->
<button class="accordion">権限者規約</button>
<div class="panel">
  <p>権限を乱用しないこと。権限は責任を持って使用してください。</p>
  <p>ルール違反者への対応は適切に行ってください。</p>
  <p>権限の変更や削除は必ず記録してください。</p>
</div>

<script>
fetch("header.html")
.then(response => response.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
});
</script>

<!-- script.js を読み込む -->
<script src="script.js"></script>

</body>
</html>
