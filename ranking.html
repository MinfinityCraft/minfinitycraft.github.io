<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ランキング - Minfinity Craft</title>

<!-- ① スマホ対応：ビューポート幅に合わせて画面を拡縮 -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ② Google Fonts読み込み（Bangers） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
/* -------------------- 基本スタイル -------------------- */
body{
  font-family:'Roboto', Arial, sans-serif; /* 通常の本文フォント */
  color:white;                              /* 文字色 */
  background:#0f2027;                        /* 背景色 */
  text-align:center;
  margin:0;
  padding:0;
}
h1,h2,h3{ font-family:'Bangers', cursive; margin:20px 0; }

/* -------------------- タイトルの光アニメ -------------------- */
h1{
  font-size:3em;  /* タイトル大きさ */
  background: linear-gradient(90deg, #ffdd00, #00ffff, #ff00ff); /* 光のグラデーション */
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: shineText 2.5s linear infinite; /* グラデーションアニメ */
  text-shadow:0 0 3px #fff,0 0 8px #ff0,0 0 12px #0ff; /* 光の影 */
}
@keyframes shineText{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}

/* -------------------- フェードインアニメ（左から） -------------------- */
.fade-row{
  opacity:0;
  transform:translateX(-50px);       /* 左にずらして非表示スタート */
  animation:fadeInRow 0.4s forwards; /* アニメーション実行 */
}
@keyframes fadeInRow{
  to{opacity:1; transform:translateX(0);} /* 最終状態：通常位置 */
}

/* -------------------- テーブルスタイル -------------------- */
table{
  width: 90%;           /* 全体の横幅 */
  max-width: 800px;     /* PCなら最大幅 */
  margin: 20px auto;
  border-collapse: collapse; /* 枠線重ねてスッキリ */
  text-align: center;
  display: table;       /* PC用通常テーブル */
}
th, td{
  padding: 10px;
  border-bottom: 1px solid #333; /* 下線 */
  text-align: center;
  white-space: nowrap; /* 改行させない */
}

/* -------------------- ナビバー -------------------- */
header{
  text-align:center;
  background:#111;
  padding:10px;
  margin-bottom:20px;
}
header a{
  display:inline-block;
  color:#00ffcc;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  transition: transform 0.3s, color 0.3s;
  position: relative;
}
header a:hover{
  transform: scale(1.3);        /* ホバーで拡大 */
  color:#ffdd00;                /* 色変更 */
}
header a::after{
  content:'';
  position:absolute;
  left:0; bottom:0;
  width:0%;
  height:2px;
  background:linear-gradient(90deg,#ffdd00,#00ffff);
  transition: width 0.3s;
}
header a:hover::after{
  width:100%; /* 下線アニメーション */
}

/* -------------------- レスポンシブ（スマホ調整） -------------------- */
@media (max-width: 600px){
  h1{ font-size:2em; }          /* タイトル小さめ */
  th, td{ padding:6px; font-size:0.9em; }
  table{
    display: block;             /* 横スクロール有効 */
    overflow-x: auto;
  }
}
@media (max-width: 400px){
  header a{ display:block; margin:5px 0; } /* ナビ縦並び */
}
</style>
</head>

<body>

<!-- -------------------- ナビゲーション -------------------- -->
<header>
  <a href="index.html">ホーム</a>
  <a href="about.html">サーバー紹介</a>
  <a href="ranking.html">ランキング</a>
</header>

<!-- -------------------- 採掘ランキング -------------------- -->
<h1>採掘ランキング</h1>
<table id="miningTable">
<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
</table>

<!-- -------------------- 所持金ランキング -------------------- -->
<h1>所持金ランキング</h1>
<table id="moneyTable">
<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
</table>

<script>
/* -------------------- 数字カウントアップ関数 -------------------- */
function animateNumberSmooth(td,target){
  const duration = 800;               // カウントアップの長さ(ms)
  const start = performance.now();    // 現在時間取得
  function step(now){
    const progress = Math.min((now - start)/duration,1); // 進行率0~1
    const value = Math.floor(target * (1 - (1-progress)*(1-progress))); // イージング計算
    td.textContent = value;           // 表示更新
    if(progress < 1) requestAnimationFrame(step); // 次フレーム
    else td.textContent = target;     // 最終値セット
  }
  requestAnimationFrame(step);        // アニメ開始
}

/* -------------------- CSV読み込み関数 -------------------- */
async function loadRanking(csvUrl, tableId){
  try{
    const response=await fetch(csvUrl);   // CSV取得
    const text=await response.text();      // テキスト化
    const rows=text.trim().split(/\r?\n/); // 行ごとに分割
    const table=document.getElementById(tableId);

    for(let i=1;i<rows.length;i++){         // 1行目はヘッダなのでスキップ
      const cells=rows[i].split(',');       // カンマで分割
      if(cells.length<3) continue;          // 要素不足はスキップ

      const tr=document.createElement('tr');
      tr.classList.add('fade-row');         // 左フェードインクラス
      tr.style.animationDelay = `${i*0.05}s`; // 順番に少しずらして表示

      // 順位
      const tdRank=document.createElement('td'); tdRank.textContent=cells[0]; tr.appendChild(tdRank);
      // プレイヤー名
      const tdName=document.createElement('td'); tdName.textContent=cells[1]; tr.appendChild(tdName);
      // 値（採掘数/所持金）
      const tdValue=document.createElement('td'); tr.appendChild(tdValue);
      const num=parseInt(cells[2]);
      if(!isNaN(num)){
        // アニメーション完了後にカウントアップ
        tr.addEventListener('animationend',()=>{
          animateNumberSmooth(tdValue,num);
        });
      }else{
        tdValue.textContent=cells[2];
      }
      table.appendChild(tr);
    }
  }catch(err){console.error("ランキング読み込みエラー:",err);}
}

/* -------------------- 公開CSVリンク -------------------- */
const miningCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv';
const moneyCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv';

/* -------------------- ページ読み込み時に表示 -------------------- */
function refresh(){
  // 一旦クリアして再読み込み
  document.getElementById('miningTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
  document.getElementById('moneyTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
  loadRanking(miningCSV,'miningTable');
  loadRanking(moneyCSV,'moneyTable');
}

// 初回表示＆5分ごと更新
refresh();
setInterval(refresh,5*60*1000);
</script>

</body>
</html>
