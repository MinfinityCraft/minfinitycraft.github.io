<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ランキング - Minfinity Craft</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
/* フォント */
body{font-family:'Roboto', Arial, sans-serif;color:white;background:#0f2027;text-align:center;}
h1,h2,h3{font-family:'Press Start 2P', monospace;}
table{width:80%;margin:20px auto;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #333;}
th{color:#00ffcc;}

/* 左フェードインアニメーション用クラス */
.fade-row{
  opacity:0;
  transform:translateX(-50px);
  animation:fadeInRow 0.5s forwards;
}

@keyframes fadeInRow{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* タイトル行はアニメなし */
tr:first-child{
  opacity:1;
  transform:translateX(0);
  animation:none;
}

/* ナビバー */
header{text-align:center;background:#111;padding:10px;margin-bottom:20px;}
header a{
  display:inline-block;       /* transform を効かせるため */
  color:#00ffcc;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  transition: transform 0.3s; /* 滑らかに拡大 */
}
header a:hover{
  transform:scale(1.3);       /* 1.3倍に拡大 */
}

/* ページ全体リンク色 */
a{color:#00ffcc;}
</style>
</head>

<body>

<header>
  <a href="index.html">ホーム</a>
  <a href="about.html">サーバー紹介</a>
  <a href="ranking.html">ランキング</a>
</header>

<h1>採掘ランキング</h1>
<table id="miningTable">
<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
</table>

<h1>所持金ランキング</h1>
<table id="moneyTable">
<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
</table>

<script>
// 数字カウントアップ
function animateNumber(td,target){
  let current=0;
  const duration=800;
  const stepTime=Math.max(Math.floor(duration/target),20);
  const interval=setInterval(()=>{
    current++;
    td.textContent=current;
    if(current>=target){td.textContent=target; clearInterval(interval);}
  },stepTime);
}

// CSV読み込み
async function loadRanking(csvUrl, tableId){
  try{
    const response=await fetch(csvUrl);
    const text=await response.text();
    const rows=text.trim().split(/\r?\n/);
    const table=document.getElementById(tableId);

    for(let i=1;i<rows.length;i++){
      const cells=rows[i].split(',');
      if(cells.length<3) continue;
      const tr=document.createElement('tr');

      // 左フェードイン用クラス追加
      tr.classList.add('fade-row');
      tr.style.animationDelay = `${i*0.1}s`; // 行ごとに少し遅らせる

      const tdRank=document.createElement('td'); tdRank.textContent=cells[0]; tr.appendChild(tdRank);
      const tdName=document.createElement('td'); tdName.textContent=cells[1]; tr.appendChild(tdName);
      const tdValue=document.createElement('td'); tr.appendChild(tdValue);

      const num=parseInt(cells[2]);
      if(!isNaN(num)) animateNumber(tdValue,num);
      else tdValue.textContent=cells[2];

      table.appendChild(tr);
    }
  }catch(err){console.error("ランキング読み込みエラー:",err);}
}

// 公開済みCSVリンク
const miningCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv';
const moneyCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv';

function refresh(){
  document.getElementById('miningTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
  document.getElementById('moneyTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
  loadRanking(miningCSV,'miningTable');
  loadRanking(moneyCSV,'moneyTable');
}

// 初回読み込み & 5分ごと自動更新
refresh();
setInterval(refresh,5*60*1000);
</script>

</body>
</html>
