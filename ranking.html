<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ランキング - Minfinity Craft</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* ---------------- 背景 ---------------- */
body{
  font-family: Arial, sans-serif;
  color:white;
  margin:0;
  padding:0;
  text-align:center;
  background: linear-gradient(180deg,#0f2027 0%,#203a43 50%,#2c5364 100%);
}

/* ---------------- ナビバー ---------------- */
nav{
  background:#111;
  padding:15px;
}

nav a{
  position:relative;
  display:inline-block;
  color:#00ffcc;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  padding-bottom:6px;
  transition:color 0.3s ease, transform 0.3s ease;
}

/* グラデ光下線 */
nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0;
  height:3px;

  background:linear-gradient(90deg,#00ffcc,#ffe600,#ff00ff);
  box-shadow:0 0 8px #00ffcc,0 0 15px #ffe600;

  transition:width 0.4s ease;
}

nav a:hover{
  color:#ffe600;
  transform:scale(1.1);
}

nav a:hover::after{
  width:100%;
}

/* ---------------- タイトル ---------------- */
h1{
  font-family:'Press Start 2P', cursive;
  font-size:2.2em;
  margin:40px 0 20px;
  background: linear-gradient(90deg,#ffe600,#00ffff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

/* ---------------- テーブル ---------------- */
table{
  width:90%;
  max-width:800px;
  margin:20px auto;
  border-collapse:collapse;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
}

th,td{
  padding:12px;
  border-bottom:1px solid #444;
  white-space:nowrap;
}

th{
  color:#ffe600;
}

tr:hover{
  background:rgba(255,255,255,0.05);
}

/* ---------------- フェードイン ---------------- */
.fade-row{
  opacity:0;
  transform:translateX(-30px);
  animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* ---------------- スマホ ---------------- */
@media (max-width:600px){

  nav a{
    display:block;
    margin:10px 0;
  }

  h1{
    font-size:1.4em;
  }

  table{
    display:block;
    overflow-x:auto;
  }

  th,td{
    font-size:0.85em;
    padding:8px;
  }
}

</style>
</head>

<body>

<nav>
  <a href="index.html">ホーム</a>
  <a href="about.html">サーバー紹介</a>
  <a href="ranking.html">ランキング</a>
</nav>

<h1>採掘ランキング</h1>
<table id="miningTable">
<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
</table>

<h1>所持金ランキング</h1>
<table id="moneyTable">
<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
</table>

<script>
function animateNumber(td,target){
  const duration=600;
  const start=performance.now();
  function step(now){
    const progress=Math.min((now-start)/duration,1);
    td.textContent=Math.floor(target*progress);
    if(progress<1) requestAnimationFrame(step);
    else td.textContent=target;
  }
  requestAnimationFrame(step);
}

async function loadRanking(url,tableId){
  const res=await fetch(url);
  const text=await res.text();
  const rows=text.trim().split(/\r?\n/);
  const table=document.getElementById(tableId);

  for(let i=1;i<rows.length;i++){
    const cells=rows[i].split(',');
    if(cells.length<3) continue;

    const tr=document.createElement('tr');
    tr.classList.add('fade-row');
    tr.style.animationDelay=`${i*0.05}s`;

    const td1=document.createElement('td');
    td1.textContent=cells[0];
    tr.appendChild(td1);

    const td2=document.createElement('td');
    td2.textContent=cells[1];
    tr.appendChild(td2);

    const td3=document.createElement('td');
    tr.appendChild(td3);

    const num=parseInt(cells[2]);
    if(!isNaN(num)){
      tr.addEventListener('animationend',()=>animateNumber(td3,num));
    }else{
      td3.textContent=cells[2];
    }

    table.appendChild(tr);
  }
}

const miningCSV='（ここにあなたのCSV）';
const moneyCSV='（ここにあなたのCSV）';

function refresh(){
  document.getElementById('miningTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
  document.getElementById('moneyTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
  loadRanking(miningCSV,'miningTable');
  loadRanking(moneyCSV,'moneyTable');
}

refresh();
setInterval(refresh,5*60*1000);
</script>

</body>
</html>
