<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ランキング | Minfinity Craft</title>

<!-- フォント -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

<!-- 共通 CSS -->
<link rel="stylesheet" href="style.css">

<!-- ランキング専用 CSS -->
<style>
/* -------------------- ランキング表 -------------------- */
table {
  width: 100%;           /* 画面幅いっぱいに広げる */
  max-width: 800px;      /* PCでは最大800px */
  margin: 20px auto;
  border-collapse: collapse;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
  pointer-events: none;  /* 押せない */
}

/* 列幅の比率を指定 */
th:nth-child(1), td:nth-child(1) { width: 15%; }  /* 順位 */
th:nth-child(2), td:nth-child(2) { width: 55%; }  /* プレイヤー名 */
th:nth-child(3), td:nth-child(3) { width: 30%; }  /* 数値 */

th, td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  text-align: center;
  cursor: default;
  white-space: nowrap;
}

tr:hover { background: none; transform: none; }

/* -------------------- ランキングタイトル光るアニメ -------------------- */
h1.main-title{
  background: linear-gradient(90deg,#ffe600,#00ffff,#ff00ff,#ffe600);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shine 4s linear infinite;
  text-shadow:0 0 4px #fff,0 0 8px #00ffff,0 0 12px #00ffff;
}

@keyframes shine{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

/* -------------------- スマホ対応 -------------------- */
@media (max-width:600px){
  table { max-width: 100%; } /* 画面幅に合わせる */
  th, td { font-size: 0.85em; padding: 8px; }
  h1.main-title { font-size: 1.4em; }
}
</style>
</head>

<body>

<header>
<a href="index.html">ホーム</a>
<a href="about.html">サーバー紹介</a>
<a href="ranking.html">ランキング</a>
</header>

<!-- 採掘ランキング -->
<h1 class="main-title">採掘ランキング</h1>
<div class="box">
<table id="miningTable">
<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
</table>
</div>

<!-- 所持金ランキング -->
<h1 class="main-title">所持金ランキング</h1>
<div class="box">
<table id="moneyTable">
<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
</table>
</div>

<!-- CSV 取得＆数字アニメーション -->
<script>
function animateNumber(td,target){
  const duration=600;
  const start=performance.now();
  function step(now){
    const progress=Math.min((now-start)/duration,1);
    td.textContent=Math.floor(target*progress);
    if(progress<1) requestAnimationFrame(step);
    else td.textContent=target;
  }
  requestAnimationFrame(step);
}

async function loadRanking(url,tableId){
  const res = await fetch(url);
  const text = await res.text();
  const rows = text.trim().split(/\r?\n/);
  const table = document.getElementById(tableId);

  for(let i=1;i<rows.length;i++){
    const cells = rows[i].split(',');
    if(cells.length<3) continue;

    const tr = document.createElement('tr');
    tr.classList.add('fade-row');
    tr.style.animationDelay = `${i*0.05}s`;

    const td1 = document.createElement('td'); td1.textContent = cells[0]; tr.appendChild(td1);
    const td2 = document.createElement('td'); td2.textContent = cells[1]; tr.appendChild(td2);
    const td3 = document.createElement('td'); tr.appendChild(td3);

    const num = parseInt(cells[2]);
    if(!isNaN(num)){
      animateNumber(td3,num); // animationend に頼らず即実行
    } else {
      td3.textContent = cells[2];
    }

    table.appendChild(tr);
  }
}

const miningCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv';
const moneyCSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv';

function refresh(){
  document.getElementById('miningTable').innerHTML = '<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
  document.getElementById('moneyTable').innerHTML  = '<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
  loadRanking(miningCSV,'miningTable');
  loadRanking(moneyCSV,'moneyTable');
}

refresh();
setInterval(refresh,5*60*1000);
</script>

</body>
</html>
