<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ランキング - Minfinity Craft</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #0f2027, #203a43);
      color: white;
      text-align: center;
    }

    header {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      padding: 15px;
      position: fixed;
      top: 0;
      width: 100%;
    }

    a {
      color: #00ffcc;
      margin: 0 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #00ffcc;
      text-align: center;
    }

    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      color: #00ffcc;
      font-size: 18px;
    }

    tr:hover {
      background-color: #1a1a1a;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">ホーム</a>
  <a href="about.html">サーバー紹介</a>
  <a href="ranking.html">ランキング</a>
</header>

<div style="margin-top:100px;">
  <h1>採掘ランキング</h1>
  <table id="miningTable">
    <tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
  </table>

  <h1>お金ランキング</h1>
  <table id="moneyTable">
    <tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
  </table>
</div>

<script>
  // CSVを読み込んでテーブルに描画する関数
  async function loadRanking(csvUrl, tableId) {
    const response = await fetch(csvUrl);
    const data = await response.text();
    const rows = data.trim().split('\n');
    const table = document.getElementById(tableId);
    // 1行目はヘッダーなので飛ばす
    for (let i = 1; i < rows.length; i++) {
      const cells = rows[i].split(',');
      const tr = document.createElement('tr');
      cells.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    }
  }

  // ここにスプレッドシートのCSV公開リンクを入れる
 　loadRanking('https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv', 'miningTable');
　　loadRanking('https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv', 'moneyTable');
  // 数分ごとに更新（例: 5分ごと）
  setInterval(() => {
    document.getElementById('miningTable').innerHTML = '<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
    document.getElementById('moneyTable').innerHTML = '<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
    loadRanking('https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv', 'miningTable');
    loadRanking('https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv', 'moneyTable');
  }, 5*60*1000); // 5分ごと
</script>

</body>
</html>
