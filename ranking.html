<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>整地ランキング</title>

<style>
html, body{
  margin:0;
  padding:0;
  min-height:100vh;
}
</style>

</head>

<body>

<h1>整地ランキング</h1>

<table border="1">
<thead>
<tr>
<th>順位</th>
<th>プレイヤー</th>
<th>採掘数</th>
<th>所持金</th>
</tr>
</thead>

<tbody id="ranking-body">
</tbody>
</table>


<script>
fetch('./ranking.json')
.then(response => response.json())
.then(data => {

const tbody = document.getElementById("ranking-body");
tbody.innerHTML = "";

data.forEach((player, index) => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${index+1}</td>
<td>${player.name}</td>
<td>${player.mined}</td>
<td>${player.money}</td>
`;

tbody.appendChild(row);

});

})
.catch(error => {
console.error("ランキング読み込み失敗:", error);
});
</script>

</body>
</html>
