<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ランキング - Minfinity Craft</title>
<style>
body{font-family:Arial,sans-serif;color:white;background:#0f2027;text-align:center;}
table{width:80%;margin:20px auto;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #333;}
th{color:#00ffcc;}
tr:hover{background:#111;}
.gold{background:#ffd700;color:black;font-weight:bold;}
.silver{background:#c0c0c0;color:black;font-weight:bold;}
.bronze{background:#cd7f32;color:black;font-weight:bold;}
</style>
</head>
<body>

<h1>採掘ランキング</h1>
<table id="miningTable">
<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>
</table>

<h1>所持金ランキング</h1>
<table id="moneyTable">
<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>
</table>

<script>
// 数字を0からカウントアップさせる関数
function animateNumber(td, target){
  let current = 0;
  const duration = 800; // 0.8秒でカウントアップ
  const stepTime = Math.max(Math.floor(duration / target), 20);
  const interval = setInterval(() => {
    current++;
    td.textContent = current;
    if(current >= target){
      td.textContent = target;
      clearInterval(interval);
    }
  }, stepTime);
}

async function loadRanking(csvUrl, tableId){
  try{
    const response = await fetch(csvUrl);
    const text = await response.text();
    const rows = text.trim().split(/\r?\n/);
    const table = document.getElementById(tableId);

    for(let i=1;i<rows.length;i++){
      const cells = rows[i].split(',');
      if(cells.length<3) continue;

      const tr = document.createElement('tr');

      if(i===1) tr.classList.add('gold');
      else if(i===2) tr.classList.add('silver');
      else if(i===3) tr.classList.add('bronze');

      const tdRank = document.createElement('td');
      tdRank.textContent = cells[0];
      tr.appendChild(tdRank);

      const tdName = document.createElement('td');
      tdName.textContent = cells[1];
      tr.appendChild(tdName);

      const tdValue = document.createElement('td');
      tr.appendChild(tdValue);

      // 数字をカウントアップ
      const num = parseInt(cells[2]);
      if(!isNaN(num)) animateNumber(tdValue, num);
      else tdValue.textContent = cells[2];

      table.appendChild(tr);
    }
  } catch(err){
    console.error("ランキング読み込みエラー:", err);
  }
}

// 公開済みCSVリンク
const miningCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSbPNYc-q67wJ_dIjnqcbkFdms6YTuHKXTnhH0Yy9EM35YhDlehk_H-QPNR9ptD3WbbSyD2eqY49xSn/pub?gid=0&single=true&output=csv';
const moneyCSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQwcLU-WT6QwxyGfzaEC0ncUBuSmrBsADeD1R8AuT5MmangVKn4XgYXuz2DlbW3iDYjSH49RcHYwQzx/pub?gid=939922891&single=true&output=csv';

function refresh(){
  document.getElementById('miningTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>採掘数</th></tr>';
  document.getElementById('moneyTable').innerHTML='<tr><th>順位</th><th>プレイヤー名</th><th>所持金</th></tr>';
  loadRanking(miningCSV,'miningTable');
  loadRanking(moneyCSV,'moneyTable');
}

// 初回読み込み
refresh();
// 5分ごとに自動更新
setInterval(refresh,5*60*1000);
</script>

</body>
</html>
